# dotfiles.conf — symlink manifest
#
# Format:  SOURCE  TARGET
#   SOURCE  path relative to ~/.dotfiles (no leading dot, so files stay
#           visible in the repo / on GitHub)
#   TARGET  path relative to $HOME (keeps its real, usually-dotted name)
#
# If SOURCE is a directory, every file under it is linked individually
# (the directory itself is never symlinked), so app-generated files can
# live next to the linked ones without ending up in this repo.

# --- Shell ---
zshrc                   .zshrc
zprofile                .zprofile
bashrc                  .bashrc

# --- Git ---
gitconfig               .gitconfig

# --- Ghostty ---
config/ghostty/config   .config/ghostty/config

# --- Neovim (lua config only; lazy-lock.json stays app-managed) ---
config/nvim/init.lua    .config/nvim/init.lua
config/nvim/lua         .config/nvim/lua

# --- Agent instructions (one source, many homes) ---
AGENT.md                .claude/CLAUDE.md
AGENT.md                .gemini/GEMINI.md
AGENT.md                .config/opencode/AGENTS.md

# ~/.gnupg/gpg-agent.conf — GnuPG agent settings.

# Cache the passphrase for 12h of idle (24h max), matching the SSH setup.
default-cache-ttl 43200
max-cache-ttl 86400

# Use the macOS GUI passphrase prompt. Requires: brew install pinentry-mac
# Uncomment once installed (path is for Apple Silicon Homebrew):
# pinentry-program /opt/homebrew/bin/pinentry-mac
